name: SonarCloud

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  frontend-build:
    name: Front-end Build
    uses: ./.github/workflows/FEBuild.yml

  backend-build:
    name: Back-end Build
    uses: ./.github/workflows/BEBuild.yml

  sonarcloud:
    name: SonarCloud
    runs-on: ubuntu-latest
    needs:
      - frontend-build
      - backend-build

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download backend SonarCloud artifacts
        uses: actions/download-artifact@v4
        with:
          name: backend-sonar-artifacts
          path: .

      - name: SonarCloud scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.organization=${{ vars.SONAR_ORGANIZATION }}
            -Dsonar.projectKey=${{ vars.SONAR_PROJECT_KEY }}
            -Dsonar.sources=Backend/src/main/java,Frontend/src
            -Dsonar.java.binaries=Backend/target/classes
            -Dsonar.coverage.jacoco.xmlReportPaths=Backend/target/site/jacoco/jacoco.xml
            -Dsonar.exclusions=Backend/target/**,Frontend/dist/**,Frontend/node_modules/**,**/*.test.*,**/*.spec.*
            -Dsonar.qualitygate.wait=true