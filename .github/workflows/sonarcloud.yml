name: SonarCloud

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  frontend-build:
    name: Front-end Build
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: Frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: Frontend
        run: npm ci

      - name: Lint frontend
        working-directory: Frontend
        run: npm run lint -- --max-warnings=0

      - name: Build frontend
        working-directory: Frontend
        run: npm run build

  backend-build:
    name: Back-end Build
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Check backend formatting
        working-directory: Backend
        run: mvn -B spotless:check

      - name: Build backend
        working-directory: Backend
        run: mvn -B clean verify

      - name: Upload backend SonarCloud artifacts
        uses: actions/upload-artifact@v4
        with:
          name: backend-sonar-artifacts
          path: |
            Backend/target/classes
            Backend/target/site/jacoco/jacoco.xml
          if-no-files-found: error

  sonarcloud:
    name: SonarCloud
    runs-on: ubuntu-latest
    needs:
      - frontend-build
      - backend-build

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download backend SonarCloud artifacts
        uses: actions/download-artifact@v4
        with:
          name: backend-sonar-artifacts
          path: .

        - name: Debug downloaded artifacts
          run: |
            echo "=== ROOT ==="
            ls -la
            echo "=== BACKEND TARGET ==="
            ls -la Backend/target || true
            echo "=== CLASSES ==="
            ls -la Backend/target/classes || true

      - name: SonarCloud scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: 
            -Dsonar.organization=${{ vars.SONAR_ORGANIZATION }}
            -Dsonar.projectKey=${{ vars.SONAR_PROJECT_KEY }}
            -Dsonar.sources=Backend/src/main/java,Frontend/src
            -Dsonar.java.binaries=Backend/target/classes
            -Dsonar.coverage.jacoco.xmlReportPaths=Backend/target/site/jacoco/jacoco.xml
            -Dsonar.exclusions=Backend/target/**,Frontend/dist/**,Frontend/node_modules/**,**/*.test.*,**/*.spec.*
            -Dsonar.qualitygate.wait=true