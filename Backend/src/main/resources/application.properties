spring.application.name=Backend

spring.datasource.url=jdbc:postgresql://localhost:5432/psk_db
spring.datasource.username=psk_user
spring.datasource.password=psk_dev_password
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

app.security.jwt.secret=PSK-2026-tiekejai-development-secret-key-NEEDS-CHANGE-IN-PRODUCTION-min-256-bits
app.security.jwt.expiration-ms=3600000
